<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - {{ plan|capitalize }} Plan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Razorpay Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 15px;
        }
        .pay-btn {
            font-size: 1.25rem;
            padding: 12px 25px;
        }
    </style>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-body text-center">
                    <h3 class="mb-3">🔐 Checkout</h3>
                    <p class="lead">You selected the <strong>{{ plan|capitalize }}</strong> plan.</p>
                    <h4 class="text-primary">Amount: ₹{{ amount }}</h4>
                    <button id="rzp-button" class="btn btn-success pay-btn mt-4">Pay Now</button>

                    <!-- Payment Success Form -->
                    <form id="success-form" method="POST" action="{{ url_for('main.payment_success') }}">
                        <input type="hidden" name="plan" value="{{ plan }}">
                        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
                        <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
                        <input type="hidden" name="razorpay_signature" id="razorpay_signature">
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Razorpay Script Initialization -->
    <script>
        var options = {
            "key": "{{ razorpay_key }}",
            "amount": "{{ amount * 100 }}",
            "currency": "INR",
            "name": "LedgerApp",
            "description": "{{ plan|capitalize }} Subscription",
            "order_id": "{{ order_id }}",
            "handler": function (response){
                document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                document.getElementById('razorpay_signature').value = response.razorpay_signature;
                document.getElementById('success-form').submit();
            },
            "theme": {
                "color": "#0d6efd"
            }
        };
        var rzp = new Razorpay(options);
        document.getElementById('rzp-button').onclick = function(e){
            rzp.open();
            e.preventDefault();
        }
    </script>

    <!-- Bootstrap JS CDN (Optional for Bootstrap features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
