{% extends 'base.html' %}

{% block content %}
<div class="container-fluid px-3 px-md-4 px-lg-5 pt-4 pb-5">

    <!-- ✅ Gradient Header -->
    <div class="p-3 rounded shadow mb-4 text-white" style="background: linear-gradient(to right, #007bff, #00c6ff);">
        <h3 class="mb-0">
            <i class="fas fa-crown me-2"></i>Choose Your Subscription Plan
        </h3>
    </div>

    <!-- ✅ Subscription Form -->
    <form method="POST" action="{{ url_for('main.subscribe') }}">
        <div class="row text-center">
            <!-- Monthly Plan -->
            <div class="col-md-6 mb-4">
                <div class="card h-100 border-primary shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary"><i class="fas fa-calendar-alt me-2"></i>Monthly Plan</h5>
                        <p>Unlimited access</p>
                        <p><strong>₹150/month</strong></p>
                        <input type="radio" name="subscription_type" value="monthly" required> Select Monthly
                    </div>
                </div>
            </div>

            <!-- Yearly Plan -->
            <div class="col-md-6 mb-4">
                <div class="card h-100 border-warning shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-warning"><i class="fas fa-calendar-check me-2"></i>Yearly Plan</h5>
                        <p>Unlimited access</p>
                        <p><strong>₹1600/year</strong></p>
                        <input type="radio" name="subscription_type" value="yearly" required> Select Yearly
                    </div>
                </div>
            </div>
        </div>

        <!-- ✅ Submit Button -->
        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success btn-lg px-5">
                <i class="fas fa-check-circle me-2"></i>Subscribe
            </button>
        </div>
    </form>
</div>
{% endblock %}
