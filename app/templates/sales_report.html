{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-2 px-md-4 px-lg-5 pt-3 pt-md-4 pt-lg-5 pb-4 pb-md-5">
    <!-- ✅ Page Header -->
    <div class="custom-header mb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
      <h3 class="text-dark fw-bold mb-0">{{ t['SALES REPORT'] }}</h3>
    </div></div>

    <!-- 🔍 Filters -->
    <form method="get" action="{{ url_for('main.sales_report') }}" class="row g-2 mb-4">
        <div class="col-12 col-sm-6 col-md-3">
            <input type="date" id="from_date" name="from_date" class="form-control"
                   value="{{ request.args.get('from_date', '') }}">
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <input type="date" id="to_date" name="to_date" class="form-control"
                   value="{{ request.args.get('to_date', '') }}">
        </div>
        <div class="col-12 col-sm-6 col-md-3">
            <input type="text" id="customer_search" name="search" class="form-control"
                   placeholder="Search Customer..." autocomplete="off"
                   value="{{ request.args.get('search', '') }}">
        </div>
        <div class="col-6 col-md-1">
            <button type="submit" class="btn btn-primary w-100">{{ t['Search'] }}</button>
        </div>
        <div class="col-6 col-md-2">
            <a href="{{ url_for('main.export_sales_csv', from_date=request.args.get('from_date', ''), to_date=request.args.get('to_date', ''), search=request.args.get('search', '')) }}"
               class="btn btn-success w-100">
                {{ t['Export to CSV'] }}
            </a>
        </div>
    </form>

    <!-- 🧾 Sales Cards -->
    <div class="row g-3" id="sales-container">
        {% include 'partials/sales_results.html' %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function () {
    $("#customer_search, #from_date, #to_date").on("input change", function () {
        $.ajax({
            url: "{{ url_for('main.sales_report') }}",
            type: "GET",
            data: {
                search: $("#customer_search").val(),
                from_date: $("#from_date").val(),
                to_date: $("#to_date").val()
            },
            headers: { "X-Requested-With": "XMLHttpRequest" },
            success: function (data) {
                $("#sales-container").html(data);
            },
            error: function () {
                alert("Failed to fetch filtered sales.");
            }
        });
    });
});
</script>
{% endblock %}

<style>
.custom-sales-card {
    border-radius: 1rem;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
    background: linear-gradient(135deg, #f8f9fa, #ffffff);
    transition: all 0.2s ease-in-out;
    border: none;
}
.custom-sales-card:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
}
.custom-sales-card .card-body {
    padding: 1rem 1.25rem;
    font-size: 0.95rem;
}
</style>
