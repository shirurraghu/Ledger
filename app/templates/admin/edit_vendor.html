<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Vendor (Admin)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 60px;
      font-family: 'Segoe UI', sans-serif;
    }

    .gradient-header {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .form-section {
      background: white;
      border-radius: 0.5rem;
      padding: 2rem;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
    }

    .form-label {
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="gradient-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0">✏️ Edit Vendor - Admin Panel</h4>
    <a href="{{ url_for('main.admin_vendors') }}" class="btn btn-outline-light btn-sm">🔙 Back</a>
  </div>

  <!-- Form Card -->
  <div class="form-section">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" value="{{ vendor.name }}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Mobile</label>
        <input type="text" name="mobile" value="{{ vendor.mobile }}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" name="address" value="{{ vendor.address }}" class="form-control" required>
      </div>
      <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <button type="submit" class="btn btn-success">✅ Update</button>
        <a href="{{ url_for('main.admin_vendors') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
