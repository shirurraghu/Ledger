{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-2 px-md-4 px-lg-5 pt-3 pt-md-4 pt-lg-5 pb-4 pb-md-5">

    <!-- ✅ Modern Header like sales_report -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded shadow-sm bg-warning">
        <h3 class="text-dark fw-bold mb-0">{{ t['All Transactions Report'] }}</h3>
    </div>

    <!-- 🔍 Filter Form -->
    <form method="get" class="row g-3 align-items-end mb-4" id="filter-form">
        <div class="col-md-3">
            <label for="from_date" class="form-label">{{ t['From Date'] }}</label>
            <input type="date" class="form-control" id="from_date" name="from_date" value="{{ request.args.get('from_date', '') }}">
        </div>
        <div class="col-md-3">
            <label for="to_date" class="form-label">{{ t['To Date'] }}</label>
            <input type="date" class="form-control" id="to_date" name="to_date" value="{{ request.args.get('to_date', '') }}">
        </div>
        <div class="col-md-3">
            <label for="search" class="form-label">{{ t['Search'] }}</label>
            <input type="text" class="form-control" id="search" name="search"
                   placeholder="Customer, Vendor, etc."
                   value="{{ request.args.get('search', '') }}">
        </div>
        <div class="col-md-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary w-100">{{ t['Search'] }}</button>
            <a href="{{ url_for('main.export_transactions_csv',
                                from_date=request.args.get('from_date', ''),
                                to_date=request.args.get('to_date', ''),
                                search=request.args.get('search', '')) }}"
               class="btn btn-outline-dark w-100">
                {{ t['Export CSV'] }}
            </a>
        </div>
    </form>

    <!-- ✅ Transaction Cards List -->
    <div class="row" id="transactions-container">
        {% include 'partials/transactions_list.html' %}
    </div>
</div>

<!-- ✅ jQuery + AJAX Filter -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function () {
    $("#filter-form input").on("change input", function () {
        const search = $("#search").val();
        const from_date = $("#from_date").val();
        const to_date = $("#to_date").val();

        $.ajax({
            url: "{{ url_for('main.transactions_report') }}",
            type: "GET",
            data: { search, from_date, to_date },
            headers: { "X-Requested-With": "XMLHttpRequest" },
            success: function (data) {
                $("#transactions-container").html(data);
            },
            error: function () {
                $("#transactions-container").html(`<div class="col-12"><div class="alert alert-danger">Failed to load transactions.</div></div>`);
            }
        });
    });
});
</script>
{% endblock %}
