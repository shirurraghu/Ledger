{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
  .bg-gradient-green {
    background: linear-gradient(90deg, #28a745, #65cc5a);
    color: white !important;
  }

  .readonly-field {
    padding: 12px 16px;
    border: none;
    background-color: #f1f3f5;
    border-radius: 10px;
    width: 100%;
    font-weight: 500;
  }

  .mic-button {
    color: white;
    background-color: gray;
    border: none;
    border-radius: 50%;
    padding: 10px 12px;
    margin-left: 10px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  .mic-button:hover {
    background-color: #343a40;
  }

  .mic-button.listening {
    background-color: red;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }

  .item-box {
    background-color: #f8f9fa;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 18px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
  }
</style>

<div class="container mt-4">
  <!-- Header -->
  <div class="p-3 rounded shadow-sm bg-gradient-green mb-4">
    <h3 class="mb-0 text-white fw-bold">🎤 {{ t['voice_add_purchase']|default("Voice Add Purchase") }}</h3>
  </div>

  <!-- Vendor Field -->
  <div class="mb-3">
    <label class="form-label fw-semibold">{{ t['vendorname']|default("Vendor") }}:</label>
    <div class="d-flex align-items-center">
      <div class="readonly-field" id="vendorname"></div>
      <button class="mic-button" onclick="captureField('vendorname')"><i class="fas fa-microphone"></i></button>
    </div>
  </div>

  <!-- Items -->
  <div id="items-container"></div>

  <!-- Add Item Button -->
  <button class="btn btn-outline-secondary w-100 mb-2" onclick="addNewItemBox()">➕ {{ t['add_item'] }}</button>
  <button class="btn btn-success w-100 mb-3" onclick="submitPurchase()">✅ {{ t['submit'] }}</button>

  <!-- Status Message -->
  <div id="status" class="mt-3 text-success fw-semibold text-center"></div>

  <!-- Modal -->
  <div class="modal fade" id="postPurchaseModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-3 shadow">
        <div class="modal-header bg-gradient-green text-white">
          <h5 class="modal-title" id="modalLabel">✅ {{ t['purchase_added_success']|default('Purchase Added Successfully!') }}</h5>
        </div>
        <div class="modal-body text-center">
          <p class="fs-5">{{ t['what_next']|default("What would you like to do next?") }}</p>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button type="button" class="btn btn-dark w-50" onclick="startNewPurchase()" data-bs-dismiss="modal">➕ {{ t['add_purchase'] }}</button>
          <a href="{{ url_for('main.viewpurchase') }}" class="btn btn-outline-primary w-50">📋 {{ t['view_purchases'] }}</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const currentLang = "{{ session['lang'] or 'en' }}";
const langMap = {
  en: 'en-IN', kn: 'kn-IN', hi: 'hi-IN', ta: 'ta-IN', te: 'te-IN', ml: 'ml-IN', bn: 'bn-IN'
};

let purchaseData = { vendorname: '', items: [] };

function captureField(field, index = null) {
  const micButtons = document.querySelectorAll('.mic-button');
  micButtons.forEach(btn => btn.classList.remove('listening'));

  const btn = event.currentTarget;
  btn.classList.add('listening');

  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = langMap[currentLang] || 'en-IN';
  recognition.interimResults = false;
  recognition.start();

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();
    if (field === 'vendorname') {
      document.getElementById('vendorname').innerText = text;
      purchaseData.vendorname = text;
    } else {
      document.getElementById(`${field}-${index}`).innerText = text;
      purchaseData.items[index][field] = text;
    }
    document.getElementById('status').innerText = `✅ Captured ${field.replace('_', ' ')}`;
    btn.classList.remove('listening');
  };

  recognition.onerror = (event) => {
    document.getElementById('status').innerText = `❌ Error: ${event.error}`;
    btn.classList.remove('listening');
  };
}

function addNewItemBox() {
  const idx = purchaseData.items.length;
  purchaseData.items.push({ itemname: '', quantity: '', rate: '', tax_percent: '' });

  const box = document.createElement('div');
  box.className = 'item-box';
  box.innerHTML = `
    <div class="mb-2">
      <label class="fw-semibold">{{ t['item']|title }}:</label>
      <div class="d-flex align-items-center">
        <div class="readonly-field" id="itemname-${idx}"></div>
        <button class="mic-button" onclick="captureField('itemname', ${idx})"><i class="fas fa-microphone"></i></button>
      </div>
    </div>
    <div class="mb-2">
      <label class="fw-semibold">{{ t['quantity']|title }}:</label>
      <div class="d-flex align-items-center">
        <div class="readonly-field" id="quantity-${idx}"></div>
        <button class="mic-button" onclick="captureField('quantity', ${idx})"><i class="fas fa-microphone"></i></button>
      </div>
    </div>
    <div class="mb-2">
      <label class="fw-semibold">{{ t['rate']|title }}:</label>
      <div class="d-flex align-items-center">
        <div class="readonly-field" id="rate-${idx}"></div>
        <button class="mic-button" onclick="captureField('rate', ${idx})"><i class="fas fa-microphone"></i></button>
      </div>
    </div>
    <div class="mb-2">
      <label class="fw-semibold">{{ t['tax_percent']|title }}:</label>
      <div class="d-flex align-items-center">
        <div class="readonly-field" id="tax_percent-${idx}"></div>
        <button class="mic-button" onclick="captureField('tax_percent', ${idx})"><i class="fas fa-microphone"></i></button>
      </div>
    </div>
  `;
  document.getElementById('items-container').appendChild(box);
}

function submitPurchase() {
  purchaseData.items = purchaseData.items.filter(Boolean);

  if (!purchaseData.vendorname || purchaseData.items.length === 0) {
    document.getElementById('status').innerText = '❌ Vendor and at least one item is required.';
    return;
  }

  fetch('/voice_add_purchase', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(purchaseData)
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById('status').innerText = `✅ ${data.message}`;
    const modal = new bootstrap.Modal(document.getElementById('postPurchaseModal'));
    modal.show();
  })
  .catch(() => {
    document.getElementById('status').innerText = '❌ Failed to submit purchase.';
  });
}

function startNewPurchase() {
  purchaseData = { vendorname: '', items: [] };
  document.getElementById('vendorname').innerText = '';
  document.getElementById('items-container').innerHTML = '';
  document.getElementById('status').innerText = '';
}
</script>
{% endblock %}
