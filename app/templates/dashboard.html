{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card { border-radius: 15px; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card p-3">
                    <h5>Sales, Purchases, Expenses & Stock Alerts Growth Chart</h5>
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/growth-chart-data')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('growthChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [
                            { label: "Sales", data: data.sales, borderColor: "blue", fill: false },
                            { label: "Purchases", data: data.purchases, borderColor: "green", fill: false },
                            { label: "Expenses", data: data.expenses, borderColor: "red", fill: false },
                            { label: "Stock Alerts", data: data.stock_alerts, borderColor: "orange", fill: false }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });
    </script>
</body>
</html>


{% endblock %}
